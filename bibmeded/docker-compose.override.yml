# docker-compose.override.yml
# Dev overrides — auto-merged by Docker Compose.
# Delete or rename this file for production-like behavior.
services:
  api:
    volumes:
      - .:/app
    command: sh -c "python -c 'from app.database import Base, get_engine; import app.models; Base.metadata.create_all(get_engine())' && echo 'DB ready' && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
