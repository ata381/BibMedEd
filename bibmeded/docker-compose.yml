services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bibmeded}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bibmeded}
      POSTGRES_DB: ${POSTGRES_DB:-bibmeded}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibmeded"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      BIBMEDED_DATABASE_URL: postgresql://${POSTGRES_USER:-bibmeded}:${POSTGRES_PASSWORD:-bibmeded}@db:5432/${POSTGRES_DB:-bibmeded}
      BIBMEDED_REDIS_URL: redis://redis:6379/0
      BIBMEDED_PUBMED_API_KEY: ${BIBMEDED_PUBMED_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "python -c 'from app.database import Base, get_engine; import app.models; Base.metadata.create_all(get_engine())' && echo 'DB ready' && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    environment:
      BIBMEDED_DATABASE_URL: postgresql://${POSTGRES_USER:-bibmeded}:${POSTGRES_PASSWORD:-bibmeded}@db:5432/${POSTGRES_DB:-bibmeded}
      BIBMEDED_REDIS_URL: redis://redis:6379/0
      BIBMEDED_PUBMED_API_KEY: ${BIBMEDED_PUBMED_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
